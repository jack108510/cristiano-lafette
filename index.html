<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Cristiano Lafette</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Inter',sans-serif;color:#e8e0d4;-webkit-font-smoothing:antialiased}

/* Intro */
.intro{position:fixed;inset:0;z-index:200;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:opacity 1.2s ease}
.intro.hidden{opacity:0;pointer-events:none}
.intro h1{font-family:'Playfair Display',serif;font-size:clamp(2.5rem,8vw,6rem);font-weight:900;color:#e8e0d4;letter-spacing:8px;text-align:center;line-height:1.1;opacity:0;animation:fadeUp 1.5s ease forwards .3s}
.intro .sub{font-size:.75rem;letter-spacing:5px;text-transform:uppercase;color:#c8a97e;margin-top:24px;opacity:0;animation:fadeUp 1.2s ease forwards 1s}
.intro .enter{margin-top:60px;font-size:.65rem;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.2);animation:breathe 2.5s ease infinite}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes breathe{0%,100%{opacity:.15}50%{opacity:.4}}

/* Room canvas */
.room-viewport{position:fixed;inset:0;overflow:hidden}
.room-layer{position:absolute;inset:0;will-change:transform;transition:none}
.room-layer img{width:100%;height:100%;object-fit:cover;image-rendering:-webkit-optimize-contrast;transform:scale(1.08);pointer-events:none}

/* Depth layers for parallax */
.depth-bg{position:absolute;inset:-40px;will-change:transform;pointer-events:none}
.depth-bg img{width:calc(100% + 80px);height:calc(100% + 80px);object-fit:cover;filter:brightness(0.25) saturate(0.6) blur(2px)}

/* Vignette */
.vignette{position:fixed;inset:0;pointer-events:none;z-index:10;background:radial-gradient(ellipse 70% 70% at center,transparent 30%,rgba(0,0,0,0.7) 100%)}

/* Room transition overlay */
.transition-overlay{position:fixed;inset:0;z-index:15;background:#000;opacity:0;pointer-events:none;transition:opacity .6s ease}
.transition-overlay.active{opacity:1}

/* Room info - hidden */
.room-info{display:none}

/* Location pins */
.pin{position:absolute;z-index:25;transform:translate(-50%,-50%);cursor:pointer;transition:all .3s}
.pin-dot{width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,0.9);border:2px solid rgba(255,255,255,0.4);box-shadow:0 0 12px rgba(255,255,255,0.3);transition:all .3s}
.pin:hover .pin-dot{transform:scale(1.4);box-shadow:0 0 20px rgba(255,255,255,0.5)}
.pin-label{position:absolute;top:-28px;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:.6rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.7);text-shadow:0 1px 4px rgba(0,0,0,0.8);opacity:0;transition:opacity .3s}
.pin:hover .pin-label{opacity:1}
.pin::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);width:1px;height:8px;background:rgba(255,255,255,0.3)}

/* Shop button - hidden */
.shop-btn{display:none}

/* Product panel */
.panel-bg{position:fixed;inset:0;z-index:90;background:rgba(0,0,0,0.6);opacity:0;pointer-events:none;transition:opacity .5s;backdrop-filter:blur(4px)}
.panel-bg.open{opacity:1;pointer-events:auto}
.product-panel{position:fixed;top:0;right:0;width:380px;max-width:90vw;height:100%;z-index:100;background:rgba(12,10,8,0.97);border-left:1px solid rgba(200,169,126,0.08);transform:translateX(100%);transition:transform .5s cubic-bezier(.22,1,.36,1);overflow-y:auto;padding:0}
.product-panel.open{transform:translateX(0)}
.product-panel .panel-head{padding:28px 28px 20px;border-bottom:1px solid rgba(255,255,255,0.04);display:flex;justify-content:space-between;align-items:center}
.product-panel .panel-title{font-family:'Playfair Display',serif;font-size:.85rem;letter-spacing:3px;text-transform:uppercase;color:#c8a97e}
.product-panel .close-btn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:rgba(255,255,255,0.3);font-size:1.2rem;transition:color .3s}
.product-panel .close-btn:hover{color:#fff}
.product-card{padding:24px 28px;border-bottom:1px solid rgba(255,255,255,0.03);cursor:pointer;transition:background .3s}
.product-card:hover{background:rgba(200,169,126,0.04)}
.product-card .pc-name{font-weight:600;font-size:.9rem;margin-bottom:4px}
.product-card .pc-desc{font-size:.7rem;color:rgba(255,255,255,0.3);margin-bottom:12px;letter-spacing:.5px}
.product-card .pc-bottom{display:flex;align-items:center;justify-content:space-between}
.product-card .pc-price{font-family:'Playfair Display',serif;font-size:1.1rem;color:#c8a97e;font-weight:700}
.product-card .pc-buy{padding:8px 18px;border:1px solid rgba(200,169,126,0.2);border-radius:6px;background:transparent;color:#c8a97e;font-size:.6rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .3s;font-family:'Inter',sans-serif}
.product-card .pc-buy:hover{background:rgba(200,169,126,0.12);border-color:rgba(200,169,126,0.4)}

/* Mobile */
@media(max-width:768px){
.nav-btn{width:44px;height:44px}
.nav-btn.left{left:12px}
.nav-btn.right{right:12px}
.logo{top:20px;left:20px;font-size:.65rem}
.counter{top:20px;right:20px}
.room-info{padding:28px 24px 28px}
.shop-btn{bottom:20px;right:20px;padding:10px 18px}
.product-panel{width:100%;max-width:100%}
}

/* Location full page */
.location-page{position:fixed;inset:0;z-index:150;background:#000;opacity:0;pointer-events:none;transition:opacity .8s ease;overflow-y:auto}
.location-page.open{opacity:1;pointer-events:auto}
.loc-close{position:fixed;top:28px;right:28px;z-index:160;width:48px;height:48px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:rgba(255,255,255,0.3);font-size:1.8rem;font-weight:300;transition:color .3s;letter-spacing:0}
.loc-close:hover{color:#fff}
.loc-title{position:fixed;top:28px;left:28px;z-index:160;font-family:'Playfair Display',serif;font-size:.85rem;letter-spacing:4px;text-transform:uppercase;color:#c8a97e}
.loc-scroll{width:100%;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:80px 0 60px}
.loc-scroll img{width:100%;max-width:1200px;height:auto;display:block;object-fit:cover;margin:0}
.loc-img-wrap{width:100%;max-width:1200px;position:relative;overflow:hidden}
.loc-img-wrap img{width:100%;height:auto;display:block}
</style>
</head>
<body>

<div class="intro" id="intro" onclick="enter()">
  <h1>CRISTIANO<br>LAFETTE</h1>
  <div class="sub">A Private Collection</div>
  <div class="enter">Click to Enter</div>
</div>

<div class="vignette"></div>
<div class="transition-overlay" id="transOverlay"></div>
<div class="logo" id="logo">Cristiano Lafette</div>

<!-- Location pins on the map -->
<div class="pin" style="left:56%;top:45%" onclick="openLocationPage('mediterranean')">
  <div class="pin-label">Mediterranean</div>
  <div class="pin-dot"></div>
</div>
<div class="pin" style="left:36%;top:49%" onclick="openLocationPage('miami')">
  <div class="pin-label">Miami</div>
  <div class="pin-dot"></div>
</div>
<div class="pin" style="left:35%;top:39%" onclick="openLocationPage('newyork')">
  <div class="pin-label">New York</div>
  <div class="pin-dot"></div>
</div>
<div class="pin" style="left:59%;top:47%" onclick="openLocationPage('maldives')">
  <div class="pin-label">Maldives</div>
  <div class="pin-dot"></div>
</div>
<div class="pin" style="left:48%;top:33%" onclick="openProducts('englishchannel')">
  <div class="pin-label">English Channel</div>
  <div class="pin-dot"></div>
</div>

<div class="panel-bg" id="panelBg" onclick="toggleShop()"></div>
<div class="product-panel" id="panel">
  <div class="panel-head">
    <div class="panel-title" id="panelTitle">Collection</div>
    <div class="close-btn" onclick="toggleShop()">&times;</div>
  </div>
  <div id="products"></div>
</div>

<div class="room-viewport" id="viewport"></div>

<!-- Full-screen location page -->
<div class="location-page" id="locationPage">
  <div class="loc-close" onclick="closeLocationPage()">&times;</div>
  <div class="loc-title" id="locTitle"></div>
  <div class="loc-scroll" id="locContent"></div>
</div>

<script>
const ROOMS=[
  {img:'photos/map.jpg',products:{
    mediterranean:[
      {name:'The Yacht Candle',desc:'Teak · Sea Salt · Bergamot',price:'$75',img:'photos/mediterranean.jpg'},
      {name:'The Villa Candle',desc:'Coconut · Tiare · Vanilla',price:'$75',img:'photos/mediterranean.jpg'},
      {name:'Her Pyjamas',desc:'Silk Crop + Shorts — Ivory',price:'$150',img:'photos/mediterranean.jpg'},
    ],
    miami:[
      {name:'The Penthouse Candle',desc:'Neroli · Vetiver · Musk',price:'$75',img:'photos/miami.jpg'},
      {name:'The Matching Set',desc:'His & Hers Pyjamas',price:'$275',img:'photos/miami.jpg'},
    ],
    newyork:[
      {name:'The Lafette Lighter',desc:'Matte Black — Torch Flame',price:'$95',img:'photos/newyork.jpg'},
      {name:'His Pyjamas',desc:'Silk Set — Charcoal',price:'$150',img:'photos/newyork.jpg'},
      {name:'The Evening Set',desc:'His + Hers + Candle + Lighter',price:'$350',img:'photos/newyork.jpg'},
    ],
    maldives:[
      {name:'The Ocean Candle',desc:'Sea Salt · Driftwood · Jasmine',price:'$75',img:'photos/maldives.jpg'},
      {name:'The Matching Set',desc:'His & Hers Pyjamas',price:'$275',img:'photos/maldives.jpg'},
      {name:'Her Pyjamas',desc:'Silk Crop + Shorts — Ivory',price:'$150',img:'photos/maldives.jpg'},
    ],
    englishchannel:[
      {name:'The Lodge Candle',desc:'Cedar · Smoke · Leather',price:'$75',img:'photos/englishchannel.jpg'},
      {name:'The Lafette Lighter',desc:'Brushed Gold — Torch Flame',price:'$95',img:'photos/englishchannel.jpg'},
      {name:'His Pyjamas',desc:'Silk Set — Ivory',price:'$150',img:'photos/englishchannel.jpg'},
    ],
  }},
];

let entered=false;
let mouseX=0.5, mouseY=0.5;
let layers=[];

// Build room layers
const vp=document.getElementById('viewport');
ROOMS.forEach((r,i)=>{
  const div=document.createElement('div');
  div.className='room-layer';
  div.style.opacity='1';
  div.innerHTML=`<img src="${r.img}" alt="Map" draggable="false">`;
  vp.appendChild(div);
  layers.push(div);
});

function enter(){
  entered=true;
  document.getElementById('intro').classList.add('hidden');
  setTimeout(()=>{
    document.getElementById('logo').classList.add('visible');
  },600);
}

function openProducts(location){
  const names={mediterranean:'Mediterranean',miami:'Miami',newyork:'New York',maldives:'Maldives',englishchannel:'English Channel'};
  document.getElementById('panelTitle').textContent=names[location]||'Collection';
  const products=ROOMS[0].products[location]||[];
  const prods=document.getElementById('products');
  prods.innerHTML=products.map(p=>`
    <div class="product-card">
      ${p.img?`<div style="width:100%;height:180px;border-radius:10px;overflow:hidden;margin-bottom:12px"><img src="${p.img}" style="width:100%;height:100%;object-fit:cover"></div>`:''}
      <div class="pc-name">${p.name}</div>
      <div class="pc-desc">${p.desc}</div>
      <div class="pc-bottom">
        <div class="pc-price">${p.price}</div>
        <button class="pc-buy" onclick="event.stopPropagation();alert('Coming soon')">Purchase</button>
      </div>
    </div>
  `).join('');
  toggleShop();
}

function toggleShop(){
  document.getElementById('panel').classList.toggle('open');
  document.getElementById('panelBg').classList.toggle('open');
}

// Location page data
const LOCATION_PAGES = {
  mediterranean: {
    title: 'Mediterranean',
    images: ['photos/mediterranean-1.jpg', 'photos/mediterranean-2.jpg']
  },
  maldives: {
    title: 'Maldives',
    images: ['photos/maldives-1.jpg']
  },
  newyork: {
    title: 'New York',
    images: ['photos/newyork-1.jpg']
  },
  miami: {
    title: 'Miami',
    images: ['photos/miami-1.jpg']
  }
};

function openLocationPage(loc) {
  const data = LOCATION_PAGES[loc];
  if (!data) { openProducts(loc); return; }
  
  document.getElementById('locTitle').textContent = data.title;
  const content = document.getElementById('locContent');
  content.innerHTML = data.images.map(img => 
    `<div class="loc-img-wrap"><img src="${img}" alt="${data.title}" draggable="false"></div>`
  ).join('');
  
  document.getElementById('locationPage').classList.add('open');
  document.getElementById('locationPage').scrollTop = 0;
}

function closeLocationPage() {
  document.getElementById('locationPage').classList.remove('open');
}

// Smooth mouse parallax
let targetX=0.5, targetY=0.5, currentX=0.5, currentY=0.5;
const PARALLAX_X=8, PARALLAX_Y=4;

document.addEventListener('mousemove',e=>{
  targetX=e.clientX/window.innerWidth;
  targetY=e.clientY/window.innerHeight;
});

// Touch parallax
document.addEventListener('touchmove',e=>{
  targetX=e.touches[0].clientX/window.innerWidth;
  targetY=e.touches[0].clientY/window.innerHeight;
},{passive:true});

function animate(){
  // Smooth interpolation
  currentX+=(targetX-currentX)*0.04;
  currentY+=(targetY-currentY)*0.04;
  
  const offsetX=((currentX-0.5)*PARALLAX_X);
  const offsetY=((currentY-0.5)*PARALLAX_Y);
  
  layers.forEach(l=>{
    if(l.style.opacity==='1'){
      const img=l.querySelector('img');
      img.style.transform=`scale(1.08) translate(${offsetX}px,${offsetY}px)`;
    }
  });
  
  requestAnimationFrame(animate);
}
animate();

// Keyboard
document.addEventListener('keydown',e=>{
  if(!entered)return;
  if(e.key==='ArrowRight')go(1);
  if(e.key==='ArrowLeft')go(-1);
  if(e.key==='Escape'){
    document.getElementById('panel').classList.remove('open');
    document.getElementById('panelBg').classList.remove('open');
  }
});

// Wheel with cooldown
let wheelLock=false;
window.addEventListener('wheel',e=>{
  if(!entered||wheelLock||transitioning)return;
  wheelLock=true;
  setTimeout(()=>wheelLock=false,1200);
  go(e.deltaY>0?1:-1);
},{passive:true});

// Swipe
let swipeX=0;
document.addEventListener('touchstart',e=>{swipeX=e.touches[0].clientX},{passive:true});
document.addEventListener('touchend',e=>{
  if(!entered)return;
  const dx=e.changedTouches[0].clientX-swipeX;
  if(Math.abs(dx)>60)go(dx<0?1:-1);
});
</script>
</body>
</html>
