<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Cristiano Lafette</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Inter',sans-serif;color:#e8e0d4;-webkit-font-smoothing:antialiased}

/* Intro */
.intro{position:fixed;inset:0;z-index:200;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:opacity 1.2s ease}
.intro.hidden{opacity:0;pointer-events:none}
.intro h1{font-family:'Playfair Display',serif;font-size:clamp(2.5rem,8vw,6rem);font-weight:900;color:#e8e0d4;letter-spacing:8px;text-align:center;line-height:1.1;opacity:0;animation:fadeUp 1.5s ease forwards .3s}
.intro .sub{font-size:.75rem;letter-spacing:5px;text-transform:uppercase;color:#c8a97e;margin-top:24px;opacity:0;animation:fadeUp 1.2s ease forwards 1s}
.intro .enter{margin-top:60px;font-size:.65rem;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.2);animation:breathe 2.5s ease infinite}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes breathe{0%,100%{opacity:.15}50%{opacity:.4}}

/* Room canvas */
.room-viewport{position:fixed;inset:0;overflow:hidden}
.room-layer{position:absolute;inset:0;will-change:transform;transition:none}
.room-layer img{width:100%;height:100%;object-fit:cover;image-rendering:-webkit-optimize-contrast;transform:scale(1.08);pointer-events:none}

/* Depth layers for parallax */
.depth-bg{position:absolute;inset:-40px;will-change:transform;pointer-events:none}
.depth-bg img{width:calc(100% + 80px);height:calc(100% + 80px);object-fit:cover;filter:brightness(0.25) saturate(0.6) blur(2px)}

/* Vignette */
.vignette{position:fixed;inset:0;pointer-events:none;z-index:10;background:radial-gradient(ellipse 70% 70% at center,transparent 30%,rgba(0,0,0,0.7) 100%)}

/* Room transition overlay */
.transition-overlay{position:fixed;inset:0;z-index:15;background:#000;opacity:0;pointer-events:none;transition:opacity .6s ease}
.transition-overlay.active{opacity:1}

/* Room info */
.room-info{position:fixed;bottom:0;left:0;right:0;z-index:20;padding:48px 48px 40px;background:linear-gradient(transparent,rgba(0,0,0,0.85) 70%);opacity:0;transform:translateY(10px);transition:all .8s ease}
.room-info.visible{opacity:1;transform:translateY(0)}
.room-info h2{font-family:'Playfair Display',serif;font-size:clamp(1.4rem,3vw,2rem);font-weight:700;letter-spacing:4px;margin-bottom:8px}
.room-info .room-location{font-size:.7rem;color:rgba(255,255,255,0.35);letter-spacing:3px;text-transform:uppercase}

/* Nav arrows */
.nav-btn{position:fixed;top:50%;z-index:30;transform:translateY(-50%);width:56px;height:56px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.08);border-radius:50%;cursor:pointer;opacity:0;transition:all .4s ease;background:rgba(0,0,0,0.3);backdrop-filter:blur(8px)}
.nav-btn.visible{opacity:.3}
.nav-btn:hover{opacity:1;border-color:rgba(200,169,126,0.3);background:rgba(200,169,126,0.08)}
.nav-btn:active{transform:translateY(-50%) scale(.92)}
.nav-btn.left{left:28px}
.nav-btn.right{right:28px}
.nav-btn svg{width:20px;height:20px;stroke:rgba(255,255,255,0.6);stroke-width:1.5;fill:none}

/* Counter */
.counter{position:fixed;top:36px;right:48px;z-index:30;font-size:.65rem;letter-spacing:3px;color:rgba(255,255,255,0.2);text-transform:uppercase;opacity:0;transition:opacity .8s ease}
.counter.visible{opacity:1}

/* Logo */
.logo{position:fixed;top:36px;left:48px;z-index:30;font-family:'Playfair Display',serif;font-size:.8rem;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:rgba(232,224,212,0.4);opacity:0;transition:opacity .8s ease}
.logo.visible{opacity:1}

/* Shop button */
.shop-btn{position:fixed;bottom:36px;right:48px;z-index:30;display:flex;align-items:center;gap:10px;padding:12px 24px;border:1px solid rgba(200,169,126,0.15);border-radius:8px;background:rgba(0,0,0,0.4);backdrop-filter:blur(12px);cursor:pointer;opacity:0;transition:all .4s ease}
.shop-btn.visible{opacity:.6}
.shop-btn:hover{opacity:1;border-color:rgba(200,169,126,0.35);transform:translateY(-2px)}
.shop-btn span{font-size:.65rem;font-weight:500;letter-spacing:2.5px;text-transform:uppercase;color:#c8a97e}
.shop-btn svg{width:16px;height:16px;stroke:#c8a97e;fill:none;stroke-width:1.5}

/* Product panel */
.panel-bg{position:fixed;inset:0;z-index:90;background:rgba(0,0,0,0.6);opacity:0;pointer-events:none;transition:opacity .5s;backdrop-filter:blur(4px)}
.panel-bg.open{opacity:1;pointer-events:auto}
.product-panel{position:fixed;top:0;right:0;width:380px;max-width:90vw;height:100%;z-index:100;background:rgba(12,10,8,0.97);border-left:1px solid rgba(200,169,126,0.08);transform:translateX(100%);transition:transform .5s cubic-bezier(.22,1,.36,1);overflow-y:auto;padding:0}
.product-panel.open{transform:translateX(0)}
.product-panel .panel-head{padding:28px 28px 20px;border-bottom:1px solid rgba(255,255,255,0.04);display:flex;justify-content:space-between;align-items:center}
.product-panel .panel-title{font-family:'Playfair Display',serif;font-size:.85rem;letter-spacing:3px;text-transform:uppercase;color:#c8a97e}
.product-panel .close-btn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:rgba(255,255,255,0.3);font-size:1.2rem;transition:color .3s}
.product-panel .close-btn:hover{color:#fff}
.product-card{padding:24px 28px;border-bottom:1px solid rgba(255,255,255,0.03);cursor:pointer;transition:background .3s}
.product-card:hover{background:rgba(200,169,126,0.04)}
.product-card .pc-name{font-weight:600;font-size:.9rem;margin-bottom:4px}
.product-card .pc-desc{font-size:.7rem;color:rgba(255,255,255,0.3);margin-bottom:12px;letter-spacing:.5px}
.product-card .pc-bottom{display:flex;align-items:center;justify-content:space-between}
.product-card .pc-price{font-family:'Playfair Display',serif;font-size:1.1rem;color:#c8a97e;font-weight:700}
.product-card .pc-buy{padding:8px 18px;border:1px solid rgba(200,169,126,0.2);border-radius:6px;background:transparent;color:#c8a97e;font-size:.6rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .3s;font-family:'Inter',sans-serif}
.product-card .pc-buy:hover{background:rgba(200,169,126,0.12);border-color:rgba(200,169,126,0.4)}

/* Mobile */
@media(max-width:768px){
.nav-btn{width:44px;height:44px}
.nav-btn.left{left:12px}
.nav-btn.right{right:12px}
.logo{top:20px;left:20px;font-size:.65rem}
.counter{top:20px;right:20px}
.room-info{padding:28px 24px 28px}
.shop-btn{bottom:20px;right:20px;padding:10px 18px}
.product-panel{width:100%;max-width:100%}
}
</style>
</head>
<body>

<div class="intro" id="intro" onclick="enter()">
  <h1>CRISTIANO<br>LAFETTE</h1>
  <div class="sub">A Private Collection</div>
  <div class="enter">Click to Enter</div>
</div>

<div class="vignette"></div>
<div class="transition-overlay" id="transOverlay"></div>
<div class="logo" id="logo">Cristiano Lafette</div>
<div class="counter" id="counter"><span id="cur">1</span> / <span id="tot">6</span></div>

<div class="nav-btn left" id="navLeft" onclick="go(-1)">
  <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
</div>
<div class="nav-btn right" id="navRight" onclick="go(1)">
  <svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
</div>

<div class="room-info" id="roomInfo">
  <h2 id="roomTitle"></h2>
  <div class="room-location" id="roomLoc"></div>
</div>

<div class="shop-btn" id="shopBtn" onclick="toggleShop()">
  <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4zM3 6h18M16 10a4 4 0 01-8 0"/></svg>
  <span>Shop</span>
</div>

<div class="panel-bg" id="panelBg" onclick="toggleShop()"></div>
<div class="product-panel" id="panel">
  <div class="panel-head">
    <div class="panel-title">From This Room</div>
    <div class="close-btn" onclick="toggleShop()">&times;</div>
  </div>
  <div id="products"></div>
</div>

<div class="room-viewport" id="viewport"></div>

<script>
const ROOMS=[
  {img:'photos/map.jpg',title:'Cristiano Lafette',loc:'A Private Collection',products:[
    {name:'The Yacht Candle',desc:'Teak · Sea Salt · Bergamot',price:'$75'},
    {name:'The Jet Candle',desc:'Oud · Leather · Amber',price:'$75'},
    {name:'The Villa Candle',desc:'Coconut · Tiare · Vanilla',price:'$75'},
    {name:'The Penthouse Candle',desc:'Neroli · Vetiver · Musk',price:'$75'},
    {name:'The Lodge Candle',desc:'Cedar · Smoke · Leather',price:'$75'},
    {name:'The Lafette Lighter',desc:'Matte Black — Torch Flame',price:'$95'},
    {name:'His Pyjamas',desc:'Silk Set — Charcoal or Ivory',price:'$150'},
    {name:'Her Pyjamas',desc:'Silk Crop + Shorts — Ivory',price:'$150'},
    {name:'The Matching Set',desc:'His & Hers Pyjamas',price:'$275'},
    {name:'The Evening Set',desc:'His + Hers + Candle + Lighter',price:'$350'},
  ]},
];

let cur=0, transitioning=false, entered=false;
let mouseX=0.5, mouseY=0.5;
let layers=[];

// Build room layers
const vp=document.getElementById('viewport');
ROOMS.forEach((r,i)=>{
  const div=document.createElement('div');
  div.className='room-layer';
  div.style.opacity=i===0?'1':'0';
  div.innerHTML=`<img src="${r.img}" alt="${r.title}" draggable="false">`;
  div.style.transition='opacity .8s ease';
  vp.appendChild(div);
  layers.push(div);
});

document.getElementById('tot').textContent=ROOMS.length;

function enter(){
  entered=true;
  document.getElementById('intro').classList.add('hidden');
  setTimeout(()=>{
    document.getElementById('logo').classList.add('visible');
    document.getElementById('counter').classList.add('visible');
    document.getElementById('navLeft').classList.add('visible');
    document.getElementById('navRight').classList.add('visible');
    document.getElementById('shopBtn').classList.add('visible');
    showRoom(0);
  },600);
}

function showRoom(idx){
  cur=idx;
  document.getElementById('cur').textContent=idx+1;
  
  // Fade info out then in
  const info=document.getElementById('roomInfo');
  info.classList.remove('visible');
  
  // Show room info with delay
  setTimeout(()=>{
    document.getElementById('roomTitle').textContent=ROOMS[idx].title;
    document.getElementById('roomLoc').textContent=ROOMS[idx].loc;
    info.classList.add('visible');
  },400);
  
  // Render products
  const prods=document.getElementById('products');
  prods.innerHTML=ROOMS[idx].products.map(p=>`
    <div class="product-card">
      <div class="pc-name">${p.name}</div>
      <div class="pc-desc">${p.desc}</div>
      <div class="pc-bottom">
        <div class="pc-price">${p.price}</div>
        <button class="pc-buy" onclick="event.stopPropagation();alert('Coming soon')">Purchase</button>
      </div>
    </div>
  `).join('');
}

function go(dir){
  if(transitioning) return;
  transitioning=true;
  
  const next=(cur+dir+ROOMS.length)%ROOMS.length;
  const overlay=document.getElementById('transOverlay');
  
  // Fade to black
  overlay.classList.add('active');
  
  setTimeout(()=>{
    // Swap layers
    layers.forEach((l,i)=>l.style.opacity=i===next?'1':'0');
    showRoom(next);
    
    // Fade from black
    setTimeout(()=>{
      overlay.classList.remove('active');
      setTimeout(()=>transitioning=false,600);
    },200);
  },600);
}

function toggleShop(){
  document.getElementById('panel').classList.toggle('open');
  document.getElementById('panelBg').classList.toggle('open');
}

// Smooth mouse parallax
let targetX=0.5, targetY=0.5, currentX=0.5, currentY=0.5;
const PARALLAX_X=30, PARALLAX_Y=15;

document.addEventListener('mousemove',e=>{
  targetX=e.clientX/window.innerWidth;
  targetY=e.clientY/window.innerHeight;
});

// Touch parallax
document.addEventListener('touchmove',e=>{
  targetX=e.touches[0].clientX/window.innerWidth;
  targetY=e.touches[0].clientY/window.innerHeight;
},{passive:true});

function animate(){
  // Smooth interpolation
  currentX+=(targetX-currentX)*0.04;
  currentY+=(targetY-currentY)*0.04;
  
  const offsetX=((currentX-0.5)*PARALLAX_X);
  const offsetY=((currentY-0.5)*PARALLAX_Y);
  
  layers.forEach(l=>{
    if(l.style.opacity==='1'){
      const img=l.querySelector('img');
      img.style.transform=`scale(1.08) translate(${offsetX}px,${offsetY}px)`;
    }
  });
  
  requestAnimationFrame(animate);
}
animate();

// Keyboard
document.addEventListener('keydown',e=>{
  if(!entered)return;
  if(e.key==='ArrowRight')go(1);
  if(e.key==='ArrowLeft')go(-1);
  if(e.key==='Escape'){
    document.getElementById('panel').classList.remove('open');
    document.getElementById('panelBg').classList.remove('open');
  }
});

// Wheel with cooldown
let wheelLock=false;
window.addEventListener('wheel',e=>{
  if(!entered||wheelLock||transitioning)return;
  wheelLock=true;
  setTimeout(()=>wheelLock=false,1200);
  go(e.deltaY>0?1:-1);
},{passive:true});

// Swipe
let swipeX=0;
document.addEventListener('touchstart',e=>{swipeX=e.touches[0].clientX},{passive:true});
document.addEventListener('touchend',e=>{
  if(!entered)return;
  const dx=e.changedTouches[0].clientX-swipeX;
  if(Math.abs(dx)>60)go(dx<0?1:-1);
});
</script>
</body>
</html>
