<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Cristiano Lafette — A Private Tour</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#C8A97E;
  --gold2:rgba(200,169,126,0.5);
  --gold3:rgba(200,169,126,0.15);
  --navy:#040A14;
  --cream:#EAE2D6;
  --muted:rgba(234,226,214,0.4);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;height:100%;
  overflow:hidden;
  background:var(--navy);
  font-family:'Inter',sans-serif;
  color:var(--cream);
  -webkit-font-smoothing:antialiased;
  user-select:none;
}

/* ─── INTRO ─── */
#intro{
  position:fixed;inset:0;z-index:500;
  background:var(--navy);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  cursor:pointer;
  transition:opacity 1.6s ease;
}
#intro.out{opacity:0;pointer-events:none}
.intro-mark{
  font-size:.7rem;letter-spacing:.5em;text-transform:uppercase;
  color:var(--gold2);margin-bottom:3rem;
  opacity:0;animation:up .8s ease forwards .3s;
}
.intro-title{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(3.5rem,10vw,8rem);
  font-weight:300;letter-spacing:.08em;
  line-height:.95;text-align:center;
  opacity:0;animation:up 1s ease forwards .6s;
}
.intro-title em{font-style:italic;color:var(--gold)}
.intro-line{
  width:48px;height:1px;background:var(--gold2);
  margin:2.5rem auto;
  opacity:0;animation:up .8s ease forwards 1.1s;
}
.intro-sub{
  font-size:.6rem;letter-spacing:.45em;text-transform:uppercase;
  color:var(--muted);
  opacity:0;animation:up .8s ease forwards 1.4s;
}
.intro-tap{
  position:absolute;bottom:3rem;
  font-size:.55rem;letter-spacing:.3em;text-transform:uppercase;
  color:rgba(200,169,126,0.25);
  animation:breathe 2.5s ease infinite 2s;
}
@keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes breathe{0%,100%{opacity:.1}50%{opacity:.45}}

/* ─── ROOMS ─── */
#rooms{position:fixed;inset:0;z-index:1}

.room{
  position:absolute;inset:0;
  opacity:0;pointer-events:none;
  transition:opacity 1s ease;
}
.room.active{opacity:1;pointer-events:auto}

/* Background */
.room-bg{
  position:absolute;inset:-60px;
  will-change:transform;
}
.room-bg img{
  width:calc(100% + 120px);height:calc(100% + 120px);
  object-fit:cover;display:block;
  /* Keep each room's filter variable */
}

/* Interior atmosphere overlay — makes it feel like you're inside */
.room-atm{
  position:absolute;inset:0;pointer-events:none;
}

/* Floor-line: subtle horizontal reference */
.room-floor{
  position:absolute;bottom:0;left:0;right:0;height:35%;
  background:linear-gradient(to top,rgba(4,10,20,.9) 0%,transparent 100%);
  pointer-events:none;
}
.room-ceil{
  position:absolute;top:0;left:0;right:0;height:20%;
  background:linear-gradient(to bottom,rgba(4,10,20,.7) 0%,transparent 100%);
  pointer-events:none;
}
.room-vignette{
  position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 90% 90% at 50% 50%,transparent 30%,rgba(4,10,20,.75) 100%);
}

/* ─── ROOM LABEL ─── */
.room-label{
  position:absolute;top:4rem;left:50%;transform:translateX(-50%);
  text-align:center;pointer-events:none;
}
.room-label-num{
  font-size:.55rem;letter-spacing:.4em;text-transform:uppercase;
  color:var(--gold2);margin-bottom:.6rem;
}
.room-label-name{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(1.8rem,4vw,3rem);font-weight:300;
  letter-spacing:.15em;
  opacity:.85;
}

/* ─── HOTSPOTS ─── */
.hotspot{
  position:absolute;
  transform:translate(-50%,-50%);
  cursor:pointer;z-index:20;
}
.hs-ring{
  position:absolute;
  width:32px;height:32px;
  border-radius:50%;
  border:1px solid rgba(200,169,126,0.5);
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  animation:hsRing 2.5s ease-out infinite;
  pointer-events:none;
}
.hs-ring2{
  animation-delay:1.2s;
}
@keyframes hsRing{
  0%{transform:translate(-50%,-50%) scale(1);opacity:.6}
  100%{transform:translate(-50%,-50%) scale(2.2);opacity:0}
}
.hs-dot{
  width:10px;height:10px;border-radius:50%;
  background:var(--gold);
  box-shadow:0 0 12px rgba(200,169,126,.6);
  transition:transform .3s;
}
.hotspot:hover .hs-dot{transform:scale(1.4)}

/* Hotspot tooltip */
.hs-tip{
  position:absolute;
  bottom:calc(100% + 16px);left:50%;
  transform:translateX(-50%);
  white-space:nowrap;
  font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;
  color:var(--gold);
  background:rgba(4,10,20,.85);
  border:1px solid rgba(200,169,126,.12);
  padding:.4rem .8rem;
  opacity:0;pointer-events:none;
  transition:opacity .25s,transform .25s;
  transform:translateX(-50%) translateY(4px);
}
.hotspot:hover .hs-tip{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

/* ─── PRODUCT CARD (floating near hotspot) ─── */
.hs-card{
  position:fixed;z-index:100;
  width:280px;
  background:rgba(6,12,22,.97);
  border:1px solid rgba(200,169,126,.1);
  transform:scale(.92);
  opacity:0;pointer-events:none;
  transition:opacity .3s ease,transform .3s ease;
}
.hs-card.visible{
  opacity:1;transform:scale(1);pointer-events:auto;
}
.hs-card-img{
  width:100%;height:160px;object-fit:cover;
  filter:brightness(.7);display:block;
}
.hs-card-body{padding:1.1rem 1.25rem 1.25rem}
.hs-card-name{
  font-family:'Cormorant Garamond',serif;
  font-size:1.05rem;font-weight:300;color:var(--cream);
  margin-bottom:.2rem;
}
.hs-card-desc{font-size:.6rem;color:var(--muted);letter-spacing:.06em;line-height:1.6;margin-bottom:.9rem}
.hs-card-row{display:flex;align-items:center;justify-content:space-between}
.hs-card-price{
  font-family:'Cormorant Garamond',serif;
  font-size:1.1rem;color:var(--gold);
}
.hs-card-buy{
  font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;
  background:none;border:1px solid rgba(200,169,126,.3);
  color:var(--gold);padding:.5rem 1rem;cursor:pointer;
  font-family:'Inter',sans-serif;transition:all .3s;
}
.hs-card-buy:hover{background:var(--gold);color:var(--navy);border-color:var(--gold)}
.hs-card-close{
  position:absolute;top:.5rem;right:.6rem;
  background:none;border:none;color:rgba(234,226,214,.25);
  font-size:1rem;cursor:pointer;line-height:1;transition:color .3s;
  padding:.2rem .3rem;
}
.hs-card-close:hover{color:var(--cream)}

/* ─── NAVIGATION ARROWS ─── */
.nav-arrow{
  position:fixed;top:50%;z-index:50;
  transform:translateY(-50%);
  width:52px;height:52px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  border:1px solid rgba(200,169,126,.1);
  background:rgba(4,10,20,.4);
  backdrop-filter:blur(4px);
  transition:all .3s;
  opacity:0;
}
.nav-arrow.visible{opacity:1;pointer-events:auto}
.nav-arrow:hover{border-color:rgba(200,169,126,.4);background:rgba(4,10,20,.7)}
.nav-arrow svg{width:18px;height:18px;stroke:var(--gold);stroke-width:1.5;fill:none}
#navPrev{left:1.5rem}
#navNext{right:1.5rem}
.nav-arrow.hidden-arrow{opacity:0!important;pointer-events:none}

/* ─── ROOM INDICATOR (bottom center) ─── */
#roomIndicator{
  position:fixed;bottom:2.5rem;left:50%;transform:translateX(-50%);
  z-index:50;display:flex;align-items:center;gap:.75rem;
  opacity:0;transition:opacity .8s;
}
#roomIndicator.visible{opacity:1}
.ri-dot{
  width:6px;height:6px;border-radius:50%;
  background:rgba(200,169,126,.2);
  cursor:pointer;transition:all .35s;
}
.ri-dot.active{
  background:var(--gold);
  transform:scale(1.4);
}

/* ─── LOGO (top left) ─── */
#logo{
  position:fixed;top:2rem;left:2rem;z-index:50;
  font-family:'Cormorant Garamond',serif;
  font-size:.95rem;font-weight:300;letter-spacing:.25em;
  color:rgba(234,226,214,.6);
  opacity:0;transition:opacity .8s;pointer-events:none;
}
#logo em{font-style:italic;color:var(--gold)}
#logo.visible{opacity:1}

/* ─── BAG ─── */
#bagBtn{
  position:fixed;top:1.75rem;right:2rem;z-index:50;
  font-size:.55rem;letter-spacing:.25em;text-transform:uppercase;
  color:var(--gold);background:none;
  border:1px solid rgba(200,169,126,.2);
  padding:.5rem 1.1rem;cursor:pointer;
  font-family:'Inter',sans-serif;transition:all .3s;
  opacity:0;
}
#bagBtn.visible{opacity:1;pointer-events:auto}
#bagBtn:hover{background:var(--gold);color:var(--navy);border-color:var(--gold)}

.bag-count{
  display:inline-flex;align-items:center;justify-content:center;
  width:15px;height:15px;border-radius:50%;
  background:var(--gold);color:var(--navy);
  font-size:.5rem;font-weight:700;margin-left:.4rem;
  opacity:0;transition:opacity .3s;vertical-align:middle;
}
.bag-count.show{opacity:1}

/* Bag panel */
#bagOverlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.5);backdrop-filter:blur(6px);
  opacity:0;pointer-events:none;transition:opacity .4s;
}
#bagOverlay.open{opacity:1;pointer-events:auto}
#bagPanel{
  position:fixed;top:0;right:0;width:380px;max-width:92vw;height:100%;
  z-index:201;
  background:#050D1A;
  border-left:1px solid rgba(200,169,126,.08);
  transform:translateX(100%);
  transition:transform .5s cubic-bezier(.22,1,.36,1);
  display:flex;flex-direction:column;
}
#bagPanel.open{transform:translateX(0)}
.bp-head{
  padding:2rem 1.75rem 1.5rem;
  border-bottom:1px solid rgba(255,255,255,.04);
  display:flex;justify-content:space-between;align-items:center;
}
.bp-title{font-size:.6rem;letter-spacing:.35em;text-transform:uppercase;color:var(--gold)}
.bp-close{background:none;border:none;color:var(--muted);font-size:1.3rem;cursor:pointer;transition:color .3s}
.bp-close:hover{color:var(--cream)}
.bp-items{flex:1;overflow-y:auto;padding:.5rem 0}
.bp-item{display:flex;gap:1rem;padding:1.1rem 1.75rem;border-bottom:1px solid rgba(255,255,255,.03)}
.bp-thumb{width:54px;height:54px;object-fit:cover;filter:brightness(.7)}
.bp-iname{font-size:.78rem;color:var(--cream);margin-bottom:.2rem}
.bp-iprice{font-size:.68rem;color:var(--gold)}
.bp-rm{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.75rem;align-self:flex-start;transition:color .3s}
.bp-rm:hover{color:var(--cream)}
.bp-empty{text-align:center;color:var(--muted);font-size:.68rem;letter-spacing:.1em;padding:4rem 2rem;line-height:2}
.bp-footer{padding:1.5rem 1.75rem;border-top:1px solid rgba(255,255,255,.04)}
.bp-total{display:flex;justify-content:space-between;margin-bottom:1.25rem;font-size:.72rem;color:var(--muted)}
.bp-total strong{color:var(--gold)}
.bp-checkout{
  width:100%;padding:.9rem;
  background:var(--gold);border:none;color:var(--navy);
  font-size:.6rem;letter-spacing:.3em;text-transform:uppercase;
  cursor:pointer;font-family:'Inter',sans-serif;transition:background .3s;
}
.bp-checkout:hover{background:#d8b98e}

/* ─── AMBIENT AUDIO BUTTON ─── */
#ambiBtn{
  position:fixed;bottom:2.5rem;right:2rem;z-index:50;
  width:40px;height:40px;border-radius:50%;
  border:1px solid rgba(200,169,126,.15);
  background:rgba(4,10,20,.4);backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--muted);font-size:.7rem;
  transition:all .3s;
  opacity:0;
}
#ambiBtn.visible{opacity:1;pointer-events:auto}
#ambiBtn:hover{border-color:rgba(200,169,126,.4);color:var(--gold)}

/* ─── TRANSITION OVERLAY ─── */
#trans{
  position:fixed;inset:0;z-index:300;
  background:var(--navy);
  opacity:0;pointer-events:none;
  transition:opacity .45s ease;
}
#trans.on{opacity:1}

/* Mobile */
@media(max-width:640px){
  .nav-arrow{width:42px;height:42px}
  .hs-card{width:240px}
  .room-label-name{font-size:1.6rem}
  #bagPanel{width:100%;max-width:100%}
}
</style>
</head>
<body>

<!-- Transition flash -->
<div id="trans"></div>

<!-- ─── INTRO ─── -->
<div id="intro" onclick="enter()">
  <div class="intro-mark">⚓ &nbsp; A Private Tour &nbsp; ⚓</div>
  <div class="intro-title">Cristiano<br/><em>Lafette</em></div>
  <div class="intro-line"></div>
  <div class="intro-sub">Step aboard. Explore the vessel.</div>
  <div class="intro-tap">Tap anywhere to board</div>
</div>

<!-- ─── CHROME ─── -->
<div id="logo">Cristiano <em>Lafette</em></div>
<button id="bagBtn" onclick="openBag()">Bag <span class="bag-count" id="bagCount">0</span></button>

<!-- ─── NAV ARROWS ─── -->
<div class="nav-arrow" id="navPrev" onclick="go(-1)">
  <svg viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg>
</div>
<div class="nav-arrow" id="navNext" onclick="go(1)">
  <svg viewBox="0 0 24 24"><polyline points="9,6 15,12 9,18"/></svg>
</div>

<!-- ─── ROOM INDICATOR ─── -->
<div id="roomIndicator"></div>

<!-- ─── BAG OVERLAY ─── -->
<div id="bagOverlay" onclick="closeBag()"></div>
<div id="bagPanel">
  <div class="bp-head">
    <div class="bp-title">Your Collection</div>
    <button class="bp-close" onclick="closeBag()">✕</button>
  </div>
  <div class="bp-items" id="bpItems"><div class="bp-empty">Nothing in your collection yet.<br/>Explore the vessel to find your pieces.</div></div>
  <div class="bp-footer">
    <div class="bp-total"><span>Total</span><strong id="bpTotal">$0</strong></div>
    <button class="bp-checkout">Proceed to Checkout</button>
  </div>
</div>

<!-- ─── ROOMS VIEWPORT ─── -->
<div id="rooms"></div>

<!-- ─── FLOATING PRODUCT CARD ─── -->
<div class="hs-card" id="hsCard">
  <button class="hs-card-close" onclick="closeCard()">✕</button>
  <img class="hs-card-img" id="hsImg" src="" alt="">
  <div class="hs-card-body">
    <div class="hs-card-name" id="hsName"></div>
    <div class="hs-card-desc" id="hsDesc"></div>
    <div class="hs-card-row">
      <div class="hs-card-price" id="hsPrice"></div>
      <button class="hs-card-buy" id="hsBuy">Add to Bag</button>
    </div>
  </div>
</div>

<script>
// ─── ROOM DATA ───
const ROOMS = [
  {
    id: 'salon',
    name: 'The Salon',
    num: 'Room I',
    photo: 'photos/mediterranean.jpg',
    filter: 'brightness(.22) saturate(.7)',
    atm: 'radial-gradient(ellipse 80% 60% at 50% 40%, rgba(40,28,12,.6) 0%, rgba(4,10,20,.92) 100%)',
    warmth: 'rgba(30,18,6,.35)',
    hotspots: [
      {x:38, y:52, label:'The Yacht Candle', product:{name:'The Yacht Candle',desc:'Teak · Sea Salt · Bergamot — 60hr burn',price:75,img:'photos/mediterranean.jpg'}},
      {x:62, y:48, label:'The Villa Candle', product:{name:'The Villa Candle',desc:'Coconut · Tiare · Vanilla — 60hr burn',price:75,img:'photos/mediterranean.jpg'}},
      {x:50, y:65, label:'The Matching Set', product:{name:'The Matching Set',desc:'His & Hers Silk Pyjamas — Ivory or Charcoal',price:275,img:'photos/mediterranean.jpg'}},
    ]
  },
  {
    id: 'cabin',
    name: 'The Master Cabin',
    num: 'Room II',
    photo: 'photos/maldives.jpg',
    filter: 'brightness(.18) saturate(.5)',
    atm: 'radial-gradient(ellipse 70% 55% at 50% 45%, rgba(12,22,36,.5) 0%, rgba(4,10,20,.94) 100%)',
    warmth: 'rgba(6,14,28,.4)',
    hotspots: [
      {x:30, y:55, label:'Her Pyjamas', product:{name:'Her Pyjamas',desc:'Silk Crop + Shorts — Ivory · S–XL',price:150,img:'photos/maldives.jpg'}},
      {x:70, y:50, label:'His Pyjamas', product:{name:'His Pyjamas',desc:'Silk Set — Charcoal · S–XXL',price:150,img:'photos/maldives.jpg'}},
      {x:50, y:40, label:'The Ocean Candle', product:{name:'The Ocean Candle',desc:'Sea Salt · Driftwood · Jasmine — 60hr burn',price:75,img:'photos/maldives.jpg'}},
    ]
  },
  {
    id: 'bar',
    name: 'The Bar Lounge',
    num: 'Room III',
    photo: 'photos/newyork.jpg',
    filter: 'brightness(.2) saturate(.6)',
    atm: 'radial-gradient(ellipse 75% 60% at 50% 50%, rgba(16,10,4,.5) 0%, rgba(4,10,20,.93) 100%)',
    warmth: 'rgba(18,10,4,.35)',
    hotspots: [
      {x:35, y:58, label:'The Lafette Lighter', product:{name:'The Lafette Lighter — Black',desc:'Matte Black · Torch Flame · Refillable',price:95,img:'photos/newyork.jpg'}},
      {x:60, y:52, label:'Brushed Gold Lighter', product:{name:'The Lafette Lighter — Gold',desc:'Brushed Gold · Torch Flame · Refillable',price:95,img:'photos/newyork.jpg'}},
      {x:48, y:68, label:'The Evening Set', product:{name:'The Evening Set',desc:'His + Hers + Candle + Lighter · Gift Boxed',price:350,img:'photos/newyork.jpg'}},
      {x:72, y:62, label:'The Lodge Candle', product:{name:'The Lodge Candle',desc:'Cedar · Smoke · Leather — 60hr burn',price:75,img:'photos/newyork.jpg'}},
    ]
  },
  {
    id: 'deck',
    name: 'The Aft Lounge',
    num: 'Room IV',
    photo: 'photos/miami.jpg',
    filter: 'brightness(.2) saturate(.55)',
    atm: 'radial-gradient(ellipse 80% 65% at 50% 60%, rgba(8,20,30,.5) 0%, rgba(4,10,20,.92) 100%)',
    warmth: 'rgba(4,16,26,.35)',
    hotspots: [
      {x:40, y:55, label:'The Penthouse Candle', product:{name:'The Penthouse Candle',desc:'Neroli · Vetiver · White Musk — 60hr burn',price:75,img:'photos/miami.jpg'}},
      {x:65, y:48, label:'The Matching Set', product:{name:'The Matching Set',desc:'His & Hers Silk Pyjamas · Gift Wrapped',price:275,img:'photos/miami.jpg'}},
    ]
  },
];

// ─── STATE ───
let current = 0;
let bag = [];
let transitioning = false;
let activeProduct = null;
const card = document.getElementById('hsCard');

// ─── BUILD ROOMS ───
const viewport = document.getElementById('rooms');
const indicator = document.getElementById('roomIndicator');

ROOMS.forEach((room, i) => {
  // Room element
  const el = document.createElement('div');
  el.className = 'room' + (i === 0 ? ' active' : '');
  el.id = 'room-' + i;

  el.innerHTML = `
    <div class="room-bg" id="rbg-${i}">
      <img src="${room.photo}" alt="${room.name}" style="filter:${room.filter}">
    </div>
    <div class="room-atm" style="background:${room.atm}"></div>
    <div class="room-atm" style="background:${room.warmth}"></div>
    <div class="room-ceil"></div>
    <div class="room-floor"></div>
    <div class="room-vignette"></div>
    <div class="room-label">
      <div class="room-label-num">${room.num} · ${ROOMS.length} Rooms</div>
      <div class="room-label-name">${room.name}</div>
    </div>
    ${room.hotspots.map((hs, j) => `
      <div class="hotspot" style="left:${hs.x}%;top:${hs.y}%"
           onclick="openCard(${i},${j},event)">
        <div class="hs-tip">${hs.label}</div>
        <div class="hs-ring"></div>
        <div class="hs-ring hs-ring2"></div>
        <div class="hs-dot"></div>
      </div>
    `).join('')}
  `;

  viewport.appendChild(el);

  // Indicator dot
  const dot = document.createElement('div');
  dot.className = 'ri-dot' + (i === 0 ? ' active' : '');
  dot.id = 'dot-' + i;
  dot.onclick = () => goTo(i);
  indicator.appendChild(dot);
});

// ─── ENTER ───
function enter() {
  document.getElementById('intro').classList.add('out');
  setTimeout(() => {
    document.getElementById('intro').style.display = 'none';
    show();
  }, 1600);
}

function show() {
  document.getElementById('logo').classList.add('visible');
  document.getElementById('bagBtn').classList.add('visible');
  document.getElementById('navPrev').classList.add('visible');
  document.getElementById('navNext').classList.add('visible');
  document.getElementById('roomIndicator').classList.add('visible');
  document.getElementById('ambiBtn') && document.getElementById('ambiBtn').classList.add('visible');
  updateArrows();
}

// ─── NAVIGATION ───
function go(dir) {
  const next = current + dir;
  if (next < 0 || next >= ROOMS.length || transitioning) return;
  goTo(next);
}

function goTo(index) {
  if (index === current || transitioning) return;
  transitioning = true;
  closeCard();

  const trans = document.getElementById('trans');
  trans.classList.add('on');

  setTimeout(() => {
    document.getElementById('room-' + current).classList.remove('active');
    document.getElementById('dot-' + current).classList.remove('active');

    current = index;

    document.getElementById('room-' + current).classList.add('active');
    document.getElementById('dot-' + current).classList.add('active');

    trans.classList.remove('on');
    updateArrows();
    setTimeout(() => { transitioning = false; }, 600);
  }, 450);
}

function updateArrows() {
  document.getElementById('navPrev').classList.toggle('hidden-arrow', current === 0);
  document.getElementById('navNext').classList.toggle('hidden-arrow', current === ROOMS.length - 1);
}

// ─── PRODUCT CARD ───
function openCard(roomIdx, hsIdx, e) {
  e.stopPropagation();
  const p = ROOMS[roomIdx].hotspots[hsIdx].product;

  document.getElementById('hsImg').src = p.img;
  document.getElementById('hsName').textContent = p.name;
  document.getElementById('hsDesc').textContent = p.desc;
  document.getElementById('hsPrice').textContent = '$' + p.price;

  activeProduct = p;
  document.getElementById('hsBuy').onclick = () => addToBag(p);

  // Position card near click but keep on screen
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const cx = e.clientX;
  const cy = e.clientY;
  const cw = 280, ch = 320;

  let left = cx + 20;
  let top = cy - ch / 2;

  if (left + cw > vw - 20) left = cx - cw - 20;
  if (top < 80) top = 80;
  if (top + ch > vh - 20) top = vh - ch - 20;

  card.style.left = left + 'px';
  card.style.top = top + 'px';
  card.classList.add('visible');
}

function closeCard() {
  card.classList.remove('visible');
  activeProduct = null;
}

// Close card when clicking room background
document.getElementById('rooms').addEventListener('click', (e) => {
  if (!e.target.closest('.hotspot') && !e.target.closest('.hs-card')) {
    closeCard();
  }
});

// ─── BAG ───
function addToBag(product) {
  bag.push({...product});
  updateBag();

  const btn = document.getElementById('hsBuy');
  btn.textContent = 'Added ✓';
  setTimeout(() => { btn.textContent = 'Add to Bag'; }, 1500);

  setTimeout(closeCard, 800);
}

function updateBag() {
  const count = bag.length;
  const countEl = document.getElementById('bagCount');
  countEl.textContent = count;
  countEl.classList.toggle('show', count > 0);

  const total = bag.reduce((s, p) => s + p.price, 0);
  document.getElementById('bpTotal').textContent = '$' + total;

  if (count === 0) {
    document.getElementById('bpItems').innerHTML = '<div class="bp-empty">Nothing in your collection yet.<br/>Explore the vessel to find your pieces.</div>';
    return;
  }

  document.getElementById('bpItems').innerHTML = bag.map((p, i) => `
    <div class="bp-item">
      <img class="bp-thumb" src="${p.img}" alt="${p.name}">
      <div style="flex:1">
        <div class="bp-iname">${p.name}</div>
        <div class="bp-iprice">$${p.price}</div>
      </div>
      <button class="bp-rm" onclick="removeFromBag(${i})">✕</button>
    </div>
  `).join('');
}

function removeFromBag(i) {
  bag.splice(i, 1);
  updateBag();
}

function openBag() {
  document.getElementById('bagPanel').classList.add('open');
  document.getElementById('bagOverlay').classList.add('open');
}

function closeBag() {
  document.getElementById('bagPanel').classList.remove('open');
  document.getElementById('bagOverlay').classList.remove('open');
}

// ─── PARALLAX ───
let tx=.5, ty=.5, cx=.5, cy=.5;
const PX=14, PY=7;

document.addEventListener('mousemove', e => {
  tx = e.clientX / innerWidth;
  ty = e.clientY / innerHeight;
});
document.addEventListener('touchmove', e => {
  tx = e.touches[0].clientX / innerWidth;
  ty = e.touches[0].clientY / innerHeight;
}, {passive:true});

(function raf() {
  cx += (tx-cx)*.03;
  cy += (ty-cy)*.03;
  const ox = (cx-.5)*PX, oy = (cy-.5)*PY;
  document.querySelectorAll('.room-bg').forEach(bg => {
    bg.style.transform = `translate(${ox}px,${oy}px)`;
  });
  requestAnimationFrame(raf);
})();

// ─── INPUT ───
let wLock = false;
window.addEventListener('wheel', e => {
  if (wLock || transitioning) return;
  wLock = true; setTimeout(()=>wLock=false, 900);
  go(e.deltaY > 0 ? 1 : -1);
}, {passive:true});

let sY = 0;
document.addEventListener('touchstart', e => { sY = e.touches[0].clientY; }, {passive:true});
document.addEventListener('touchend', e => {
  const dy = e.changedTouches[0].clientY - sY;
  if (Math.abs(dy) > 55 && !transitioning) go(dy < 0 ? 1 : -1);
});

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(1);
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') go(-1);
  if (e.key === 'Escape') { closeCard(); closeBag(); }
});
</script>
</body>
